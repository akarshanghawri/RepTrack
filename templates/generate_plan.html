{% extends 'base.html' %}
{% block title %}AI Fitness Plan – RepTrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-8 fade-up">

    <h1 class="page-heading mb-1">AI Fitness Plan</h1>
    <p class="page-subheading mb-4">Fill in your details and get a personalized plan</p>

    <form method="POST">

        <!-- Profile -->
        <div class="card p-4 mb-4">
            <div style="font-size:0.75rem; font-weight:700; text-transform:uppercase;
                        letter-spacing:0.08em; color:var(--accent-light); margin-bottom:1.25rem;">
                <i class="bi bi-person-fill me-2"></i>Your Profile
            </div>
            <div class="row g-3">
                <div class="col-sm-3">
                    <label class="form-label">Age</label>
                    <input type="number" name="age" class="form-control" placeholder="e.g. 25" required>
                </div>
                <div class="col-sm-3">
                    <label class="form-label">Gender</label>
                    <select name="gender" class="form-select" required>
                        <option value="">Select</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="col-sm-3">
                    <label class="form-label">Height (cm)</label>
                    <input type="number" name="height" class="form-control" placeholder="e.g. 175" required>
                </div>
                <div class="col-sm-3">
                    <label class="form-label">Weight (kg)</label>
                    <input type="number" name="weight" class="form-control" placeholder="e.g. 75" required>
                </div>
                <div class="col-sm-6">
                    <label class="form-label">Occupation</label>
                    <input type="text" name="occupation" class="form-control" placeholder="e.g. Desk job, Student">
                </div>
                <div class="col-sm-6">
                    <label class="form-label">Daily Activity Level</label>
                    <select name="activity_level" class="form-select" required>
                        <option value="">Select</option>
                        <option>Low (mostly sitting)</option>
                        <option>Moderate (some walking)</option>
                        <option>High (physically active job)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Goals -->
        <div class="card p-4 mb-4">
            <div style="font-size:0.75rem; font-weight:700; text-transform:uppercase;
                        letter-spacing:0.08em; color:var(--accent-light); margin-bottom:1.25rem;">
                <i class="bi bi-bullseye me-2"></i>Fitness Goals
            </div>
            <div class="row g-3">
                <div class="col-sm-6">
                    <label class="form-label">Primary Goal</label>
                    <select name="primary_goal" class="form-select" required>
                        <option value="">Select</option>
                        <option>Fat Loss</option>
                        <option>Muscle Gain</option>
                        <option>Body Recomposition</option>
                        <option>Strength</option>
                        <option>Endurance</option>
                        <option>General Fitness</option>
                    </select>
                </div>
                <div class="col-sm-6">
                    <label class="form-label">Secondary Goal <span style="color:var(--text-subtle);font-size:0.75rem;">(optional)</span></label>
                    <select name="secondary_goal" class="form-select">
                        <option value="">None</option>
                        <option>Fat Loss</option>
                        <option>Muscle Gain</option>
                        <option>Improve Endurance</option>
                        <option>Improve Flexibility</option>
                    </select>
                </div>
                <div class="col-sm-6">
                    <label class="form-label">Target Weight (kg) <span style="color:var(--text-subtle);font-size:0.75rem;">(optional)</span></label>
                    <input type="number" name="target_weight" class="form-control" placeholder="e.g. 70">
                </div>
                <div class="col-sm-6">
                    <label class="form-label">Timeframe</label>
                    <select name="timeframe" class="form-select" required>
                        <option value="">Select</option>
                        <option>1 month</option>
                        <option>2 months</option>
                        <option>3 months</option>
                        <option>4 months</option>
                        <option>6 months</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Experience & Availability -->
        <div class="card p-4 mb-4">
            <div style="font-size:0.75rem; font-weight:700; text-transform:uppercase;
                        letter-spacing:0.08em; color:var(--accent-light); margin-bottom:1.25rem;">
                <i class="bi bi-calendar3 me-2"></i>Experience & Availability
            </div>
            <div class="row g-3">
                <div class="col-sm-6">
                    <label class="form-label">Experience Level</label>
                    <select name="experience" class="form-select" required>
                        <option value="">Select</option>
                        <option>Beginner (no structured training)</option>
                        <option>Intermediate (6 months – 2 years)</option>
                        <option>Advanced (2+ years)</option>
                    </select>
                </div>
                <div class="col-sm-3">
                    <label class="form-label">Days per Week</label>
                    <select name="days" class="form-select" required>
                        {% for d in [2, 3, 4, 5, 6] %}
                        <option>{{ d }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-sm-3">
                    <label class="form-label">Session Duration</label>
                    <select name="duration" class="form-select" required>
                        <option>30 minutes</option>
                        <option>45 minutes</option>
                        <option selected>60 minutes</option>
                        <option>90 minutes</option>
                    </select>
                </div>
                <div class="col-sm-6">
                    <label class="form-label">Preferred Time</label>
                    <select name="preferred_time" class="form-select">
                        <option>Morning</option>
                        <option>Afternoon</option>
                        <option selected>Evening</option>
                    </select>
                </div>
                <div class="col-sm-6">
                    <label class="form-label">Equipment Available</label>
                    <select name="equipment" class="form-select" required>
                        <option>Full gym (machines, dumbbells, barbells, cardio)</option>
                        <option>Dumbbells only</option>
                        <option>Resistance bands</option>
                        <option>Home – bodyweight only</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Health & Lifestyle -->
        <div class="card p-4 mb-4">
            <div style="font-size:0.75rem; font-weight:700; text-transform:uppercase;
                        letter-spacing:0.08em; color:var(--accent-light); margin-bottom:1.25rem;">
                <i class="bi bi-heart-pulse-fill me-2"></i>Health & Lifestyle
            </div>
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">Injuries / Health Concerns <span style="color:var(--text-subtle);font-size:0.75rem;">(optional)</span></label>
                    <textarea name="injuries" class="form-control" rows="2"
                              placeholder="e.g. mild lower back stiffness, bad knees..."></textarea>
                </div>
                <div class="col-sm-4">
                    <label class="form-label">Sleep per Night</label>
                    <select name="sleep" class="form-select">
                        <option>Less than 5 hours</option>
                        <option>5–6 hours</option>
                        <option selected>6–7 hours</option>
                        <option>7–8 hours</option>
                        <option>8+ hours</option>
                    </select>
                </div>
                <div class="col-sm-4">
                    <label class="form-label">Stress Level</label>
                    <select name="stress" class="form-select">
                        <option>Low</option>
                        <option selected>Medium</option>
                        <option>High</option>
                    </select>
                </div>
                <div class="col-sm-4">
                    <label class="form-label">Diet Type</label>
                    <select name="diet" class="form-select" required>
                        <option>No restrictions</option>
                        <option>Vegetarian</option>
                        <option>Vegan</option>
                        <option>Keto</option>
                        <option>High protein</option>
                    </select>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100" style="padding:0.8rem; font-size:1rem;">
            <i class="bi bi-robot me-2"></i>Generate My Plan
        </button>

    </form>
</div>
</div>


<!-- for the loading icon -->
<script>
document.querySelector('form').addEventListener('submit', function() {
    const btn = document.querySelector('button[type="submit"]')
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Generating your plan...'
    btn.disabled = true
})
</script>

{% endblock %}
