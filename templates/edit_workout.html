{% extends 'base.html' %}
{% block title %}Edit Workout – RepTrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-sm-11 fade-up">

        <div class="d-flex align-items-center gap-2 mb-4">
            <a href="{{ url_for('main.index') }}" class="btn btn-sm"
               style="background:var(--bg-elevated);color:var(--text-muted);border:1px solid var(--border-strong);">
                <i class="bi bi-arrow-left"></i>
            </a>
            <div>
                <h1 class="page-heading mb-0" style="font-size:1.5rem;">Edit Workout</h1>
                <p class="page-subheading mb-0" style="font-size:0.8rem;">Update your session details</p>
            </div>
        </div>

        <div class="card p-4">
            <form method="POST">

                <div id="sets-container" class="mb-3">
                    <label class="form-label"><i class="bi bi-layers me-1"></i>Sets</label>

                    {% for s in workout.sets | sort(attribute='set_number') %}
                    <div class="set-row d-flex gap-2 align-items-center mb-2">
                        <span style="color:var(--text-muted); font-size:0.85rem; width:55px;">
                            Set {{ s.set_number }}
                        </span>
                        <input type="number" name="reps" class="form-control"
                            placeholder="Reps" min="1" value="{{ s.reps }}" required>
                        <input type="number" name="weight" class="form-control"
                            placeholder="kg" min="0" step="0.5"
                            value="{{ s.weight if s.weight else '' }}">
                        <button type="button" class="btn btn-sm btn-outline-danger remove-set">✕</button>
                    </div>
                    {% endfor %}
                </div>

                <button type="button" class="btn btn-sm btn-info mb-4" id="add-set">
                    <i class="bi bi-plus-lg me-1"></i>Add Set
                </button>

                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-calendar3 me-1"></i>Date</label>
                    <input type="date" name="date" class="form-control"
                           value="{{ workout.date }}">
                </div>

                <div class="mb-4">
                    <label class="form-label"><i class="bi bi-chat-left-text me-1"></i>Notes</label>
                    <textarea name="comment" class="form-control" rows="3"
                              placeholder="Any notes about this session…">{{ workout.comment }}</textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-grow-1" style="padding:0.7rem;">
                        <i class="bi bi-check-lg me-2"></i>Update Workout
                    </button>
                    <a href="{{ url_for('main.index') }}" class="btn"
                       style="background:var(--bg-elevated);color:var(--text-muted);border:1px solid var(--border-strong);padding:0.7rem 1rem;">
                        Cancel
                    </a>
                </div>
            </form>
        </div>

    </div>
</div>

<script>
    const container = document.getElementById('sets-container')
    const addBtn = document.getElementById('add-set')

    addBtn.addEventListener('click', () => {
        const rows = container.querySelectorAll('.set-row')
        const newRow = rows[0].cloneNode(true)

        newRow.querySelector('span').textContent = `Set ${rows.length + 1}`

        newRow.querySelectorAll('input').forEach(input => input.value = '')

        container.appendChild(newRow)
        updateRemoveButtons()
    })

    // Remove a set row
    container.addEventListener('click', (e) => {
        if (e.target.classList.contains('remove-set')) {
            e.target.closest('.set-row').remove()
            renumberSets()
            updateRemoveButtons()
        }
    })

    // Renumber "Set 1", "Set 2" etc after a removal
    function renumberSets() {
        container.querySelectorAll('.set-row').forEach((row, i) => {
            row.querySelector('span').textContent = `Set ${i + 1}`
        })
    }

    // Hide remove button when only 1 set remains
    function updateRemoveButtons() {
        const rows = container.querySelectorAll('.set-row')
        rows.forEach(row => {
            row.querySelector('.remove-set').style.display = rows.length === 1 ? 'none' : ''
        })
    }

    updateRemoveButtons() // run on load
</script>

{% endblock %}
