{% extends 'base.html' %}
{% block title %}Edit Workout – RepTrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-sm-11 fade-up">

        <div class="d-flex align-items-center gap-2 mb-4">
            <a href="{{ url_for('main.index') }}" class="btn btn-sm"
               style="background:var(--bg-elevated);color:var(--text-muted);border:1px solid var(--border-strong);">
                <i class="bi bi-arrow-left"></i>
            </a>
            <div>
                <h1 class="page-heading mb-0" style="font-size:1.5rem;">Edit Workout</h1>
                <p class="page-subheading mb-0" style="font-size:0.8rem;">Update your session details</p>
            </div>
        </div>

        <div class="card p-4">
            <form method="POST">

                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label"><i class="bi bi-layers me-1"></i>Sets</label>
                        <input type="number" name="sets" class="form-control"
                               value="{{ workout.sets }}" min="1" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label"><i class="bi bi-arrow-repeat me-1"></i>Reps</label>
                        <input type="number" name="reps" class="form-control"
                               value="{{ workout.reps }}" min="1" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-calendar3 me-1"></i>Date</label>
                    <input type="date" name="date" class="form-control"
                           value="{{ workout.date }}">
                </div>

                <div class="mb-4">
                    <label class="form-label"><i class="bi bi-chat-left-text me-1"></i>Notes</label>
                    <textarea name="comment" class="form-control" rows="3"
                              placeholder="Any notes about this session…">{{ workout.comment }}</textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-grow-1" style="padding:0.7rem;">
                        <i class="bi bi-check-lg me-2"></i>Update Workout
                    </button>
                    <a href="{{ url_for('main.index') }}" class="btn"
                       style="background:var(--bg-elevated);color:var(--text-muted);border:1px solid var(--border-strong);padding:0.7rem 1rem;">
                        Cancel
                    </a>
                </div>
            </form>
        </div>

    </div>
</div>
{% endblock %}
