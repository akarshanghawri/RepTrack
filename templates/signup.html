{% extends 'base.html' %}
{% block title %}Sign Up – RepTrack{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5 col-sm-10 scale-in">

        <div class="text-center mb-4">
            <div style="font-size:2.5rem; margin-bottom:0.5rem;">🏋️</div>
            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Start tracking your gains today</p>
        </div>

        <div class="auth-card">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background:var(--bg-elevated);border-color:var(--border-strong);color:var(--text-muted);">
                            <i class="bi bi-envelope-fill"></i>
                        </span>
                        <input type="email" class="form-control" name="email"
                               placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background:var(--bg-elevated);border-color:var(--border-strong);color:var(--text-muted);">
                            <i class="bi bi-person-fill"></i>
                        </span>
                        <input type="text" class="form-control" name="username"
                               placeholder="your_username" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background:var(--bg-elevated);border-color:var(--border-strong);color:var(--text-muted);">
                            <i class="bi bi-lock-fill"></i>
                        </span>
                        <input type="password" class="form-control" name="password"
                               placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-success w-100" style="padding:0.7rem;">
                    <i class="bi bi-person-plus-fill me-2"></i>Create Account
                </button>
            </form>

            <p class="text-center mt-4 mb-0" style="color:var(--text-muted); font-size:0.875rem;">
                Already have an account? <a href="{{ url_for('auth.login') }}" class="auth-link">Login</a>
            </p>
        </div>

    </div>
</div>
{% endblock %}
